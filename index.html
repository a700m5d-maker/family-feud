<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الشقة فيود</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#FFD700;--gold2:#FFA500;--gold3:#B8860B;
  --navy:#050D26;--navy2:#0A1840;--navy3:#112260;--navy4:#1A3A8A;
  --red:#E8000A;--red2:#FF3333;--green:#00C851;--white:#FFF;
  --shadow-gold:0 0 40px rgba(255,215,0,0.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--navy);font-family:'Cairo',sans-serif;color:var(--white);overflow:hidden}
.screen{width:100%;height:100%;display:flex;flex-direction:column}
.hidden{display:none!important}

/* BACKGROUND CANVAS */
#bg-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.bg-overlay{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:
    radial-gradient(ellipse 110% 55% at 50% -5%,rgba(26,58,138,0.5) 0%,transparent 65%),
    radial-gradient(ellipse 70% 35% at 50% 105%,rgba(5,13,38,0.8) 0%,transparent 60%);
}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:2;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.007) 3px,rgba(255,255,255,0.007) 4px);
}

/* LANDING */
#landing{position:relative;z-index:3;align-items:center;justify-content:center;gap:4vh}
.logo-wrap{display:flex;flex-direction:column;align-items:center}
.logo-svg{width:min(68vw,580px);filter:drop-shadow(0 0 30px rgba(255,180,0,0.5))}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 28px rgba(255,180,0,.5))}50%{filter:drop-shadow(0 0 55px rgba(255,215,0,.9))}}
.logo-svg{animation:logoPulse 3s ease-in-out infinite}
.landing-btns{display:flex;gap:3vw;flex-wrap:wrap;justify-content:center}
.land-btn{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--navy3) 0%,var(--navy2) 100%);border:2px solid var(--navy4);border-radius:12px;padding:2.5vh 4vw;cursor:pointer;font-size:min(2.4vw,22px);font-weight:700;font-family:'Cairo',sans-serif;color:var(--white);transition:border-color .2s,transform .15s;min-width:240px;text-align:center}
.land-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,215,0,.08) 0%,transparent 100%);opacity:0;transition:opacity .2s}
.land-btn:hover{border-color:var(--gold);transform:translateY(-3px)}
.land-btn:hover::before{opacity:1}
.land-btn-icon{font-size:min(3.5vw,32px);display:block;margin-bottom:.5vh}

/* DISPLAY */
#display{position:relative;z-index:3;padding:1.5vh 2vw;gap:1.2vh}
.scoreboard{display:grid;grid-template-columns:1fr auto 1fr;background:linear-gradient(180deg,var(--navy3) 0%,var(--navy2) 100%);border-radius:14px;border:2px solid var(--navy4);padding:1.2vh 2vw;flex-shrink:0;position:relative;overflow:hidden}
.scoreboard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent)}
.team-block{display:flex;flex-direction:column}
.team-block.right{align-items:flex-end}
.team-block.left{align-items:flex-start}
.team-name-lbl{font-size:min(1.6vw,15px);color:rgba(255,255,255,.6);font-weight:700}
.team-score-num{font-size:min(6vw,60px);font-weight:900;line-height:1;transition:color .3s}
.team-block.active .team-name-lbl{color:var(--gold)}
.team-block.active .team-score-num{color:var(--gold);text-shadow:var(--shadow-gold)}
.sb-logo{display:flex;flex-direction:column;align-items:center;gap:.3vh}
.sb-logo-svg{width:min(12vw,110px)}
.sb-rp-box{background:linear-gradient(180deg,var(--gold) 0%,var(--gold2) 100%);color:var(--navy);border-radius:8px;padding:.2vh 1.2vw;font-size:min(2.8vw,28px);font-weight:900;min-width:80px;text-align:center;box-shadow:0 0 20px rgba(255,165,0,.4)}
.sb-rp-lbl{font-size:min(1vw,10px);color:rgba(255,255,255,.5);letter-spacing:.1em}

.q-display-box{background:linear-gradient(180deg,var(--navy3) 0%,var(--navy2) 100%);border:2px solid var(--navy4);border-radius:12px;padding:1.2vh 2vw;text-align:center;flex-shrink:0;position:relative;overflow:hidden}
.q-display-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.q-label{font-size:min(1.1vw,11px);color:rgba(255,255,255,.4);letter-spacing:.2em;margin-bottom:.3vh}
.q-text-big{font-size:min(3vw,32px);font-weight:700;line-height:1.4}

.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:1vw;flex:1;min-height:0}
.ans-card{background:linear-gradient(135deg,var(--navy2) 0%,var(--navy) 100%);border:2px solid var(--navy4);border-radius:10px;display:flex;align-items:center;gap:1.2vw;padding:0 1.5vw;overflow:hidden;transition:border-color .3s,background .3s;position:relative}
.ans-card::after{content:'';position:absolute;inset:0;opacity:0;background:linear-gradient(135deg,rgba(255,215,0,.05),transparent);transition:opacity .3s}
.ans-card.rev{border-color:var(--gold);background:linear-gradient(135deg,rgba(10,24,64,.9),rgba(5,13,38,.95))}
.ans-card.rev::after{opacity:1}
@keyframes revealPop{0%{transform:scale(.92);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
.ans-card.rev{animation:revealPop .35s ease-out}
.a-badge{width:min(4vw,42px);height:min(4vw,42px);border-radius:50%;flex-shrink:0;background:var(--navy3);border:2px solid var(--navy4);display:flex;align-items:center;justify-content:center;font-size:min(2vw,18px);font-weight:900;color:rgba(255,255,255,.5);transition:all .3s}
.ans-card.rev .a-badge{background:linear-gradient(180deg,var(--gold) 0%,var(--gold2) 100%);border-color:var(--gold3);color:var(--navy)}
.a-body{flex:1;text-align:right}
.a-hidden-dots{font-size:min(3vw,28px);color:var(--navy4);letter-spacing:.35em}
.a-reveal-text{font-size:min(2.8vw,28px);font-weight:700}
.a-reveal-pts{font-size:min(1.3vw,12px);color:var(--gold)}
.a-bar-wrap{width:min(5vw,48px);flex-shrink:0}
.a-bar-bg{height:.8vh;background:var(--navy3);border-radius:4px;overflow:hidden}
.a-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:4px;transition:width .5s .2s}

.strikes-row{display:flex;justify-content:center;gap:2vw;flex-shrink:0}
.x-mark{width:min(5.5vw,54px);height:min(5.5vw,54px);border-radius:50%;border:3px solid var(--navy4);display:flex;align-items:center;justify-content:center;font-size:min(3vw,30px);color:var(--navy4);transition:all .25s;font-weight:900}
.x-mark.hit{border-color:var(--red2);color:var(--red2);background:rgba(232,0,10,.15);box-shadow:0 0 25px rgba(232,0,10,.5);animation:xShake .4s ease-out}
@keyframes xShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px) rotate(-5deg)}40%{transform:translateX(6px) rotate(5deg)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* STEAL BANNER */
.steal-banner{background:linear-gradient(90deg,var(--gold3),var(--gold),var(--gold2),var(--gold),var(--gold3));background-size:200% 100%;color:var(--navy);border-radius:10px;padding:1vh 2vw;text-align:center;font-size:min(2.5vw,24px);font-weight:900;flex-shrink:0;animation:shimmer 2s linear infinite,sbpulse .8s ease-in-out infinite alternate}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes sbpulse{from{box-shadow:0 0 15px rgba(255,165,0,.4)}to{box-shadow:0 0 35px rgba(255,165,0,.9)}}

/* BIG X — SQUARE */
#big-x-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(160,0,0,.12);backdrop-filter:blur(3px);z-index:999}
@keyframes bigXIn{0%{transform:scale(.05) rotate(-8deg);opacity:0}55%{transform:scale(1.06) rotate(1deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes bigXOut{to{transform:scale(1.15);opacity:0}}
.big-x-wrap{animation:bigXIn .38s cubic-bezier(.2,.8,.3,1.2)}
.big-x-wrap.leaving{animation:bigXOut .22s ease-in forwards}
.big-x-square{
  width:min(52vw,480px);height:min(52vw,480px);
  background:linear-gradient(135deg,#8B0000,#CC0000,#FF0000);
  border:6px solid #FF4444;
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 80px rgba(255,0,0,.7),inset 0 0 40px rgba(0,0,0,.3);
  position:relative;overflow:hidden;
}
.big-x-square::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,.03) 20px,rgba(255,255,255,.03) 21px)}
.big-x-text{font-family:'Bebas Neue','Cairo',sans-serif;font-size:min(42vw,380px);font-weight:900;color:#fff;line-height:1;text-shadow:0 0 30px rgba(255,100,100,.8);margin-top:-2%}

/* HOST */
#host{position:relative;z-index:3;overflow-y:auto;background:var(--navy)}
.host-inner{min-height:100%;padding:1.5vh 1.5vw;display:flex;flex-direction:column;gap:1vh}
.host-header{display:grid;grid-template-columns:1fr auto;gap:1vw;align-items:center;background:linear-gradient(180deg,var(--navy3) 0%,var(--navy2) 100%);border:1px solid var(--navy4);border-radius:10px;padding:1vh 1.5vw;flex-shrink:0}
.host-scores{display:flex;gap:2vw}
.h-score-block{text-align:center}
.h-sname{font-size:min(1.3vw,12px);color:rgba(255,255,255,.5)}
.h-snum{font-size:min(2.8vw,26px);font-weight:900;color:var(--gold)}
.host-btns{display:flex;gap:.5vw;flex-wrap:wrap;justify-content:flex-end}
.hbtn{background:transparent;border:1.5px solid var(--navy4);border-radius:7px;padding:.55vh 1.2vw;font-size:min(1.5vw,14px);font-weight:700;font-family:'Cairo',sans-serif;color:var(--white);cursor:pointer;transition:background .15s,transform .1s,border-color .15s}
.hbtn:hover{background:rgba(255,255,255,.07)}
.hbtn:active{transform:scale(.95)}
.hbtn.danger{border-color:var(--red2);color:var(--red2)}
.hbtn.danger:hover{background:rgba(232,0,10,.15)}
.hbtn.success{border-color:var(--green);color:var(--green)}
.hbtn.success:hover{background:rgba(0,200,81,.1)}
.hbtn.gold{border-color:var(--gold);color:var(--gold)}
.hbtn.gold:hover{background:rgba(255,215,0,.08)}
.host-q-box{background:var(--navy2);border:1px solid var(--navy4);border-radius:8px;padding:1vh 1.5vw;text-align:center;font-size:min(1.8vw,16px);font-weight:700}
.host-rpts{font-size:min(1.3vw,12px);color:var(--gold);margin-top:.2vh}
.host-strikes{display:flex;gap:1vw;justify-content:center}
.h-x{width:32px;height:32px;border-radius:50%;border:2px solid var(--navy4);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--navy4);transition:all .2s}
.h-x.hit{border-color:var(--red2);color:var(--red2);background:rgba(232,0,10,.15)}
.host-ans-list{display:flex;flex-direction:column;gap:.6vh}
.host-ans{display:flex;align-items:center;gap:1vw;background:var(--navy2);border:1px solid var(--navy4);border-radius:7px;padding:.7vh 1.2vw;cursor:pointer;transition:background .15s}
.host-ans:hover{background:rgba(26,58,138,.4)}
.host-ans.rev{background:rgba(6,24,64,.9);border-color:var(--gold)}
.ha-num{width:24px;height:24px;border-radius:50%;background:var(--navy3);border:1px solid var(--navy4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);flex-shrink:0}
.host-ans.rev .ha-num{background:var(--gold3);border-color:var(--gold);color:var(--navy)}
.ha-text{flex:1;font-size:min(1.6vw,15px);font-weight:600}
.ha-pts{font-size:min(1.3vw,12px);color:var(--gold);font-weight:700}
.ha-reveal-btn{font-size:min(1.1vw,11px);background:transparent;border:1px solid var(--gold);color:var(--gold);border-radius:4px;padding:.2vh .6vw;cursor:pointer;font-family:'Cairo',sans-serif;flex-shrink:0}
.ha-reveal-btn:hover{background:rgba(255,215,0,.1)}
.ha-check{color:var(--gold);font-size:min(1.3vw,12px);flex-shrink:0}
.host-qselect{background:var(--navy2);border:1px solid var(--navy4);border-radius:8px;padding:1vh 1.5vw}
.hqs-lbl{font-size:min(1.2vw,11px);color:rgba(255,255,255,.4);margin-bottom:.5vh;letter-spacing:.1em}
.hqs-btns{display:flex;flex-wrap:wrap;gap:.4vw;max-height:14vh;overflow-y:auto}
.hqs-btn{background:var(--navy3);border:1px solid var(--navy4);border-radius:4px;padding:.25vh .7vw;font-size:min(1.1vw,10px);font-family:'Cairo',sans-serif;color:rgba(255,255,255,.5);cursor:pointer;text-align:right;transition:all .15s}
.hqs-btn:hover{border-color:rgba(255,255,255,.3);color:var(--white)}
.hqs-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(255,165,0,.08)}

/* WIN */
.win-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2vh;z-index:200}
.win-trophy{font-size:min(12vw,100px);animation:trophyBounce 1s ease-in-out infinite alternate}
@keyframes trophyBounce{from{transform:translateY(0)}to{transform:translateY(-15px)}}
.win-name{font-size:min(8vw,70px);font-weight:900;color:var(--gold);text-shadow:var(--shadow-gold);text-align:center}
.win-scores-row{display:flex;gap:5vw;align-items:center}
.wt{text-align:center}.wt-n{font-size:min(2vw,18px);color:rgba(255,255,255,.5)}.wt-s{font-size:min(6vw,54px);font-weight:900}
.wt.champ .wt-n{color:var(--gold)}.wt.champ .wt-s{color:var(--gold);text-shadow:var(--shadow-gold)}
.win-close-btn{background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:.8vh 3vw;font-size:min(2vw,18px);font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer}

/* CONFETTI */
.confetti-piece{position:fixed;top:-10px;pointer-events:none;z-index:201;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<!-- animated background canvas -->
<canvas id="bg-canvas"></canvas>
<div class="bg-overlay"></div>
<div class="scanlines"></div>

<div id="app">

<!-- BIG X — SQUARE -->
<div id="big-x-overlay">
  <div class="big-x-wrap" id="big-x-wrap">
    <div class="big-x-square">
      <div class="big-x-text">✕</div>
    </div>
  </div>
</div>

<!-- LANDING -->
<div id="landing" class="screen">
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFE566"/><stop offset="50%" stop-color="#FFD700"/><stop offset="100%" stop-color="#B8860B"/>
        </linearGradient>
        <linearGradient id="lg2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1A3A8A"/><stop offset="100%" stop-color="#050D26"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
      </defs>
      <rect x="2" y="2" width="596" height="156" rx="20" fill="url(#lg2)" stroke="url(#lg1)" stroke-width="4"/>
      <rect x="10" y="10" width="580" height="140" rx="14" fill="none" stroke="rgba(255,215,0,0.25)" stroke-width="1.5"/>
      <rect x="20" y="14" width="560" height="2" rx="1" fill="rgba(255,255,255,0.15)"/>
      <text x="42" y="105" text-anchor="middle" font-size="44" fill="url(#lg1)" filter="url(#glow)">★</text>
      <text x="558" y="105" text-anchor="middle" font-size="44" fill="url(#lg1)" filter="url(#glow)">★</text>
      <text x="300" y="88" text-anchor="middle" font-family="'Cairo',sans-serif" font-size="74" font-weight="900" fill="url(#lg1)" filter="url(#glow)" letter-spacing="2">الشقة فيود</text>
      <text x="300" y="128" text-anchor="middle" font-family="'Bebas Neue','Cairo',sans-serif" font-size="22" fill="rgba(255,215,0,0.6)" letter-spacing="8">FAMILY  FEUD</text>
      <polygon points="22,80 30,70 38,80 30,90" fill="url(#lg1)" opacity=".7"/>
      <polygon points="562,80 570,70 578,80 570,90" fill="url(#lg1)" opacity=".7"/>
    </svg>
  </div>
  <div class="landing-btns">
    <div class="land-btn" onclick="startAs('display')"><span class="land-btn-icon">📺</span>شاشة العرض</div>
    <div class="land-btn" onclick="startAs('host')"><span class="land-btn-icon">🎮</span>شاشة التحكم</div>
  </div>
  <div style="font-size:min(1.5vw,13px);color:rgba(255,255,255,.3);letter-spacing:.1em">افتح نفس الرابط مرتين</div>
</div>

<!-- DISPLAY -->
<div id="display" class="screen hidden">
  <div class="scoreboard">
    <div class="team-block right" id="d-tb1">
      <div class="team-name-lbl" id="d-n1">الفريق الأول</div>
      <div class="team-score-num" id="d-s1">0</div>
    </div>
    <div class="sb-logo">
      <svg class="sb-logo-svg" viewBox="0 0 220 70" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="slg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFE566"/><stop offset="100%" stop-color="#B8860B"/></linearGradient></defs>
        <rect x="1" y="1" width="218" height="68" rx="10" fill="#0A1840" stroke="url(#slg)" stroke-width="2"/>
        <text x="110" y="35" text-anchor="middle" font-family="'Cairo',sans-serif" font-size="22" font-weight="900" fill="url(#slg)">الشقة فيود</text>
        <text x="110" y="56" text-anchor="middle" font-family="'Bebas Neue',sans-serif" font-size="13" fill="rgba(255,215,0,.5)" letter-spacing="5">FAMILY FEUD</text>
      </svg>
      <div class="sb-rp-lbl">النقاط</div>
      <div class="sb-rp-box" id="d-rp">0</div>
    </div>
    <div class="team-block left" id="d-tb2">
      <div class="team-name-lbl" id="d-n2">الفريق الثاني</div>
      <div class="team-score-num" id="d-s2">0</div>
    </div>
  </div>

  <div class="steal-banner hidden" id="d-steal">⚡ مرحلة السرقة! — هل يريد الفريق الآخر الإجابة؟ ⚡</div>

  <div class="q-display-box">
    <div class="q-label">السـؤال</div>
    <div class="q-text-big" id="d-q">—</div>
  </div>

  <div class="ans-grid" id="d-grid"></div>

  <div class="strikes-row" id="d-strikes">
    <div class="x-mark">✕</div><div class="x-mark">✕</div><div class="x-mark">✕</div>
  </div>
</div>

<!-- HOST -->
<div id="host" class="screen hidden">
  <div class="host-inner">
    <div class="host-header">
      <div>
        <div style="font-size:min(1.4vw,13px);font-weight:700;color:var(--gold);margin-bottom:.4vh">🎮 التحكم</div>
        <div class="host-scores">
          <div class="h-score-block"><div class="h-sname" id="h-n1">ف1</div><div class="h-snum" id="h-s1">0</div></div>
          <div class="h-score-block"><div class="h-sname" id="h-n2">ف2</div><div class="h-snum" id="h-s2">0</div></div>
          <div class="h-score-block"><div class="h-sname">جولة</div><div class="h-snum" id="h-rp">0</div></div>
        </div>
        <div style="font-size:min(1.2vw,11px);color:rgba(255,255,255,.4);margin-top:.3vh" id="h-turn-lbl">دور: —</div>
      </div>
      <div class="host-btns">
        <button class="hbtn danger" onclick="triggerError()">✕ خطأ</button>
        <button class="hbtn success" onclick="award(1)">منح ف1</button>
        <button class="hbtn success" onclick="award(2)">منح ف2</button>
        <button class="hbtn gold" onclick="doSteal()">⚡ سرقة</button>
        <button class="hbtn" onclick="resetCurrentQ()">↺ إعادة</button>
        <button class="hbtn" onclick="showWin()">🏆</button>
        <button class="hbtn" onclick="goLanding()">↩</button>
      </div>
    </div>

    <div id="h-steal-bar" class="steal-banner hidden">⚡ مرحلة السرقة!</div>

    <div class="host-q-box">

<script>
// ════════════════════════════════════
//  ANIMATED BACKGROUND — particles + beams
// ════════════════════════════════════
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], beams = [];

  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  // Floating gold particles
  for(let i=0;i<60;i++){
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      r: .5+Math.random()*2.5,
      vx: (Math.random()-.5)*.3, vy: -.1-Math.random()*.4,
      o: .1+Math.random()*.5, life:0, maxLife: 200+Math.random()*400
    });
  }

  // Light beams sweeping across
  for(let i=0;i<4;i++){
    beams.push({
      x: Math.random()*W, speed: .3+Math.random()*.5,
      w: 40+Math.random()*120, o: .015+Math.random()*.025
    });
  }

  function drawBeam(b){
    const grad = ctx.createLinearGradient(b.x-b.w,0,b.x+b.w,0);
    grad.addColorStop(0,'rgba(255,215,0,0)');
    grad.addColorStop(.5,`rgba(255,215,0,${b.o})`);
    grad.addColorStop(1,'rgba(255,215,0,0)');
    ctx.fillStyle=grad;
    ctx.fillRect(b.x-b.w,0,b.w*2,H);
    b.x += b.speed;
    if(b.x-b.w > W) b.x = -b.w;
  }

  function tick(){
    ctx.clearRect(0,0,W,H);

    // subtle radial base
    const rg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
    rg.addColorStop(0,'rgba(17,34,96,0.4)');
    rg.addColorStop(1,'rgba(5,13,38,0)');
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);

    // beams
    beams.forEach(drawBeam);

    // particles
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.life++;
      if(p.life>p.maxLife||p.y<-10){ p.x=Math.random()*W; p.y=H+10; p.life=0; }
      const fade = p.life<40 ? p.life/40 : p.life>p.maxLife-40 ? (p.maxLife-p.life)/40 : 1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,215,0,${p.o*fade})`;
      ctx.fill();
    });

    requestAnimationFrame(tick);
  }
  tick();
})();

// ════════════════════════════════════
//  AUDIO ENGINE
// ════════════════════════════════════
const AC = new (window.AudioContext||window.webkitAudioContext)();

function playCorrect(){
  const t=AC.currentTime;
  [523,659,784,1047].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,t+i*.09);
    g.gain.linearRampToValueAtTime(.35,t+i*.09+.02);
    g.gain.exponentialRampToValueAtTime(.001,t+i*.09+.4);
    o.start(t+i*.09);o.stop(t+i*.09+.45);
  });
  // applause noise
  const buf=AC.createBuffer(1,AC.sampleRate*.35,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length)*.09;
  const src=AC.createBufferSource(),g2=AC.createGain();
  src.buffer=buf;src.connect(g2);g2.connect(AC.destination);
  g2.gain.setValueAtTime(.5,t+.1);src.start(t+.1);
}

function playError(){
  const t=AC.currentTime;
  // 3 harsh buzzer hits — classic Family Feud style
  for(let h=0;h<3;h++){
    const delay=h*.18;
    // main buzz
    const o1=AC.createOscillator(),g1=AC.createGain();
    o1.connect(g1);g1.connect(AC.destination);
    o1.type='sawtooth';
    o1.frequency.setValueAtTime(160,t+delay);
    o1.frequency.linearRampToValueAtTime(70,t+delay+.13);
    g1.gain.setValueAtTime(.55,t+delay);
    g1.gain.linearRampToValueAtTime(0,t+delay+.14);
    o1.start(t+delay);o1.stop(t+delay+.16);
    // low thud
    const o2=AC.createOscillator(),g2=AC.createGain();
    o2.connect(g2);g2.connect(AC.destination);
    o2.type='square';o2.frequency.value=55;
    g2.gain.setValueAtTime(.45,t+delay);
    g2.gain.exponentialRampToValueAtTime(.001,t+delay+.12);
    o2.start(t+delay);o2.stop(t+delay+.14);
    // distortion crunch
    const o3=AC.createOscillator(),g3=AC.createGain();
    o3.connect(g3);g3.connect(AC.destination);
    o3.type='square';
    o3.frequency.setValueAtTime(200,t+delay);
    o3.frequency.exponentialRampToValueAtTime(40,t+delay+.12);
    g3.gain.setValueAtTime(.25,t+delay);
    g3.gain.linearRampToValueAtTime(0,t+delay+.13);
    o3.start(t+delay);o3.stop(t+delay+.15);
  }
}

function playSteal(){
  // Tense, rising suspense sting — like "it's steal time!"
  const t=AC.currentTime;
  // Rising pulse
  [220,277,330,415,523].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=i%2===0?'triangle':'sine';
    o.frequency.value=f;
    g.gain.setValueAtTime(0,t+i*.08);
    g.gain.linearRampToValueAtTime(.28,t+i*.08+.03);
    g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.35);
    o.start(t+i*.08);o.stop(t+i*.08+.4);
  });
  // tension drone
  const o2=AC.createOscillator(),g2=AC.createGain();
  o2.connect(g2);g2.connect(AC.destination);
  o2.type='sawtooth';
  o2.frequency.setValueAtTime(110,t+.3);
  o2.frequency.linearRampToValueAtTime(220,t+.9);
  g2.gain.setValueAtTime(0,t+.3);
  g2.gain.linearRampToValueAtTime(.18,t+.45);
  g2.gain.linearRampToValueAtTime(0,t+.95);
  o2.start(t+.3);o2.stop(t+1);
  // final accent hit
  const o3=AC.createOscillator(),g3=AC.createGain();
  o3.connect(g3);g3.connect(AC.destination);
  o3.type='sine';o3.frequency.value=659;
  g3.gain.setValueAtTime(0,t+.85);
  g3.gain.linearRampToValueAtTime(.4,t+.87);
  g3.gain.exponentialRampToValueAtTime(.001,t+1.2);
  o3.start(t+.85);o3.stop(t+1.3);
}

function playAward(){
  const t=AC.currentTime;
  [523,659,784,880,1047,1318].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=i%2===0?'sine':'triangle';o.frequency.value=f;
    g.gain.setValueAtTime(0,t+i*.07);
    g.gain.linearRampToValueAtTime(.3,t+i*.07+.03);
    g.gain.exponentialRampToValueAtTime(.001,t+i*.07+.6);
    o.start(t+i*.07);o.stop(t+i*.07+.65);
  });
}

function playTheme(){
  const t=AC.currentTime;
  [{f:659,d:.12},{f:784,d:.12},{f:880,d:.12},{f:784,d:.08},{f:659,d:.12},{f:784,d:.2},{f:1047,d:.25}]
  .reduce((off,n)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type='sine';o.frequency.value=n.f;
    g.gain.setValueAtTime(0,t+off);
    g.gain.linearRampToValueAtTime(.28,t+off+.02);
    g.gain.exponentialRampToValueAtTime(.001,t+off+n.d+.05);
    o.start(t+off);o.stop(t+off+n.d+.1);
    return off+n.d;
  },0);
}

function resumeAudio(){ if(AC.state==='suspended') AC.resume(); }

let S={qi:0,s1:0,s2:0,n1:'الفريق الأول',n2:'الفريق الثاني',rp:0,strikes:0,rev:Array(8).fill(false),errTrig:0,stealing:false,cur:1};
let mode='';

function save(){ localStorage.setItem(DB_KEY,JSON.stringify(S)); if(mode==='host') renderHost(); }
function load(){ try{ const d=localStorage.getItem(DB_KEY); if(d) S=JSON.parse(d); }catch(e){} }

// ════════════════════════════════════
//  ROUTING
// ════════════════════════════════════
function startAs(m){
  resumeAudio(); playTheme();
  mode=m;
  document.getElementById('landing').classList.add('hidden');
  document.getElementById(m).classList.remove('hidden');
  load();
  m==='display'?renderDisplay():renderHost();
  window.addEventListener('storage',e=>{
    if(e.key!==DB_KEY) return;
    const ns=JSON.parse(e.newValue);
    if(mode==='display' && ns.errTrig!==S.errTrig) showBigX();
    S=ns; mode==='display'?renderDisplay():renderHost();
  });
  let lastRaw='';
  setInterval(()=>{const r=localStorage.getItem(DB_KEY)||'';if(r!==lastRaw){lastRaw=r;load();if(mode==='display')renderDisplay();}},400);
}
function goLanding(){
  mode='landing';
  ['display','host'].forEach(s=>document.getElementById(s).classList.add('hidden'));
  document.getElementById('landing').classList.remove('hidden');
}

// ════════════════════════════════════
//  GAME ACTIONS
// ════════════════════════════════════
function reveal(i){
  resumeAudio();
  if(S.rev[i]) return;
  S.rev[i]=true; S.rp+=QUESTIONS[S.qi].a[i].p;
  playCorrect(); save();
}

function triggerError(){
  resumeAudio();
  S.errTrig=Date.now();
  if(!S.stealing){ S.strikes++; if(S.strikes>=3){S.stealing=true; setTimeout(()=>{resumeAudio();playSteal();},200);} }
  playError(); showBigX(); save();
}

function doSteal(){
  resumeAudio(); playSteal();
  S.stealing=true; S.cur=S.cur===1?2:1; save();
}

function award(team){
  resumeAudio();
  if(team===1) S.s1+=S.rp; else S.s2+=S.rp;
  S.rp=0; S.strikes=0; S.stealing=false;
  playAward(); save();
}

function jumpToQ(i){ S.qi=i; S.rev=Array(QUESTIONS[i].a.length).fill(false); S.strikes=0; S.rp=0; S.stealing=false; save(); }
function resetCurrentQ(){ jumpToQ(S.qi); }

function spawnConfetti(){
  const colors=['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#FFA500','#FF69B4','#FFFFFF'];
  for(let i=0;i<90;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.5}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(6+Math.random()*3)*1000);
  }
}

function setText(id,v){ const e=document.getElementById(id); if(e) e.textContent=v; }
document.addEventListener('click', resumeAudio, {once:true});
</script>
</body>

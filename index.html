<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاملي فيود - النسخة المطورة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* نفس التنسيقات الرائعة التي أرفقتها مع تحسينات بسيطة */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#FFD700;--navy:#07122E;--navy-mid:#0E1F50;--navy-card:#0D1E55;--red:#FF2222;--green:#44CC44;--white:#FFF;--muted:#7AA4E8}
html,body{width:100%;height:100%;background:var(--navy);font-family:'Cairo',sans-serif;color:var(--white);overflow:hidden}
#app{position:relative;z-index:1;width:100vw;height:100vh}
.hidden{display:none!important}
.screen{width:100%;height:100%;display:flex;flex-direction:column}

/* LANDING */
#landing{align-items:center;justify-content:center;gap:3vh;padding:4vw}
.land-title{font-size:min(10vw,90px);font-weight:900;color:var(--gold);text-shadow:0 0 60px #FFD70055;text-align:center}
.land-cards{display:flex;gap:2vw;flex-wrap:wrap;justify-content:center;width:100%;max-width:860px}
.land-card{flex:1;min-width:240px;background:var(--navy-card);border:1.5px solid #2A4A9A;border-radius:1.5vw;padding:3vh 3vw;cursor:pointer;transition:0.2s;text-align:center}
.land-card:hover{border-color:var(--gold);transform:translateY(-4px)}

/* SCOREBOARD & GAME UI */
.scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1.5vw;background:var(--navy-mid);border:1.5px solid #2A4A9A;border-radius:1vw;padding:1.2vh 2vw}
.t-score{font-size:min(5.5vw,54px);font-weight:900}
.active .t-score{color:var(--gold);text-shadow:0 0 20px #FFD70055}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:1vw;padding:1vw}
.ans-card{background:var(--navy-card);border:1.5px solid #2A4A9A;border-radius:.8vw;display:flex;align-items:center;padding:1vh 1.5vw;min-height:60px}
.ans-card.rev{background:#061840;border-color:var(--gold)}

/* HOST CONTROLS */
.host-ans{display:flex;align-items:center;gap:1vw;background:#0A1840;border:1px solid #2A4A9A;padding:.65vh 1.2vw;margin-bottom:5px;cursor:pointer}
.hbtn{background:transparent;border:1.5px solid #2A4A9A;padding:.55vh 1.3vw;color:white;cursor:pointer;font-family:'Cairo'}
.hbtn.danger{border-color:var(--red);color:var(--red)}
.hbtn.success{border-color:var(--green);color:var(--green)}
</style>
</head>
<body>

<div id="app">
  <div id="landing" class="screen">
    <div class="land-title">فاملي فيود 🎯</div>
    <div class="land-cards">
      <div class="land-card" onclick="goHost()">🎮 شاشة المقدّم</div>
      <div class="land-card" onclick="goDisplay()">📺 شاشة العرض</div>
    </div>
  </div>

  <div id="host" class="screen hidden" style="padding:20px; overflow-y:auto;">
    <h2 id="h-qtxt" style="color:var(--gold); margin-bottom:10px;">السؤال يظهر هنا</h2>
    <div id="h-anslist"></div>
    <hr style="margin:20px 0; opacity:0.2">
    <div style="display:flex; gap:10px; justify-content:center;">
        <button class="hbtn danger" onclick="addStrike()">✕ خطأ</button>
        <button class="hbtn success" onclick="awardPoints()">✔ منح النقاط</button>
        <button class="hbtn" onclick="nextRound()">الجولة التالية ◄</button>
    </div>
  </div>

  <div id="display" class="screen hidden" style="padding:20px;">
    <div class="scoreboard">
        <div class="t-block" id="d-tb1"><div id="d-tn1">فريق 1</div><div class="t-score" id="d-sc1">0</div></div>
        <div style="text-align:center"><div style="color:var(--gold); font-weight:900">FAMILY FEUD</div><div id="d-rpts" style="font-size:24px">0</div></div>
        <div class="t-block" id="d-tb2"><div id="d-tn2">فريق 2</div><div class="t-score" id="d-sc2">0</div></div>
    </div>
    <div id="d-qtxt" style="font-size:30px; text-align:center; margin:20px 0;">السؤال؟</div>
    <div class="ans-grid" id="d-ansgrid"></div>
  </div>
</div>

<script>
// الأصوات (روابط مباشرة لمؤثرات صوتية عامة)
const soundCorrect = new Audio('https://www.soundjay.com/buttons/sounds/button-37.mp3');
const soundError = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');

let G = {
  t1: "الفريق الأول", t2: "الفريق الثاني",
  s1: 0, s2: 0, qi: 0, strikes: 0, rp: 0, cur: 1,
  rev: [], 
  questions: [
    {q: "نادي سعودي حقق دوري أبطال آسيا", a: [{t: "الهلال", p: 45}, {t: "الاتحاد", p: 35}, {t: "النصر", p: 15}, {t: "السد (قديم)", p: 5}]},
    {q: "شيء يطلبه العميل من فني الصيانة دائماً", a: [{t: "تخفيض السعر", p: 40}, {t: "سرعة الإنجاز", p: 30}, {t: "ضمان العمل", p: 20}, {t: "قطع غيار أصلية", p: 10}]},
    {q: "لاعب سعودي سجل في كأس العالم", a: [{t: "سالم الدوسري", p: 38}, {t: "سامي الجابر", p: 30}, {t: "سعيد العويران", p: 20}, {t: "فؤاد أنور", p: 12}]},
    {q: "أكثر شيء يضيع في البيت", a: [{t: "ريموت التلفزيون", p: 42}, {t: "المفاتيح", p: 28}, {t: "الشاحن", p: 18}, {t: "فرشة الشعر", p: 12}]}
  ]
};

function save() { localStorage.setItem('ff_game', JSON.stringify(G)); }
function load() { const d = localStorage.getItem('ff_game'); if(d) G = JSON.parse(d); }

function goHost() { 
    isHost = true; 
    G.rev = new Array(G.questions[G.qi].a.length).fill(false);
    document.getElementById('landing').classList.add('hidden');
    document.getElementById('host').classList.remove('hidden');
    renderHost();
}

function goDisplay() { 
    isDisplay = true;
    document.getElementById('landing').classList.add('hidden');
    document.getElementById('display').classList.remove('hidden');
    setInterval(() => { load(); renderDisplay(); }, 500); 
}

function renderHost() {
    const q = G.questions[G.qi];
    document.getElementById('h-qtxt').innerText = q.q;
    document.getElementById('h-anslist').innerHTML = q.a.map((ans, i) => `
        <div class="host-ans ${G.rev[i]?'rev':''}" onclick="reveal(${i})">
            ${ans.t} (${ans.p} نقطة) ${G.rev[i]?'✅':''}
        </div>
    `).join('');
}

function reveal(i) {
    if(G.rev[i]) return;
    G.rev[i] = true;
    G.rp += G.questions[G.qi].a[i].p;
    soundCorrect.play();
    save();
    renderHost();
}

function addStrike() {
    G.strikes++;
    soundError.play();
    if(G.strikes >= 3) alert("سرقة للنقاط!");
    save();
}

function awardPoints() {
    if(G.cur === 1) G.s1 += G.rp; else G.s2 += G.rp;
    G.rp = 0;
    save();
}

function nextRound() {
    G.qi = (G.qi + 1) % G.questions.length;
    G.rev = new Array(G.questions[G.qi].a.length).fill(false);
    G.strikes = 0; G.rp = 0; G.cur = G.cur === 1 ? 2 : 1;
    save();
    renderHost();
}

function renderDisplay() {
    const q = G.questions[G.qi];
    document.getElementById('d-qtxt').innerText = q.q;
    document.getElementById('d-sc1').innerText = G.s1;
    document.getElementById('d-sc2').innerText = G.s2;
    document.getElementById('d-rpts').innerText = G.rp;
    document.getElementById('d-ansgrid').innerHTML = q.a.map((ans, i) => `
        <div class="ans-card ${G.rev[i]?'rev':''}">
            ${G.rev[i] ? ans.t + ' - ' + ans.p : '???'}
        </div>
    `).join('');
}
</script>
</body>
</html>

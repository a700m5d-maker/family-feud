<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاملي فيود - النسخة الاحترافية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--navy:#07122E;--navy-mid:#0E1F50;--navy-card:#0D1E55;--red:#FF2222;--green:#44CC44;--white:#FFF;--muted:#7AA4E8}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--navy);font-family:'Cairo',sans-serif;color:var(--white);overflow:hidden}
.screen{width:100%;height:100%;display:flex;flex-direction:column;padding:20px}
.hidden{display:none!important}

/* الشاشات */
#landing{align-items:center;justify-content:center;gap:30px}
.btn-main{background:var(--navy-card);border:2px solid #2A4A9A;padding:30px;border-radius:20px;cursor:pointer;width:300px;text-align:center;transition:0.3s}
.btn-main:hover{border-color:var(--gold);transform:translateY(-5px)}

/* شاشة العرض */
.scoreboard{display:grid;grid-template-columns:1fr auto 1fr;background:var(--navy-mid);border-radius:15px;padding:15px;border:2px solid #2A4A9A}
.t-score{font-size:60px;font-weight:900}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;flex:1}
.ans-card{background:var(--navy-card);border:2px solid #2A4A9A;border-radius:10px;display:flex;align-items:center;padding:10px 20px;font-size:22px;height:70px}
.ans-card.rev{background:#061840;border-color:var(--gold)}
.strike-box{display:flex;justify-content:center;gap:20px;margin-top:20px}
.x-mark{font-size:50px;color:#2A4A9A;border:3px solid #2A4A9A;border-radius:50%;width:70px;height:70px;display:flex;align-items:center;justify-content:center}
.x-mark.hit{color:var(--red);border-color:var(--red);background:#2A0000}

/* شاشة التحكم */
.host-ans{background:#0A1840;border:1px solid #2A4A9A;padding:10px;margin-bottom:5px;cursor:pointer;display:flex;justify-content:space-between}
.host-ans.rev{border-color:var(--gold);background:#2A1A00}
.ctrl-btns{display:flex;gap:10px;justify-content:center;margin-top:20px}
.hbtn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:bold;font-family:'Cairo'}
</style>
</head>
<body>

<div id="app">
    <div id="landing" class="screen">
        <h1 style="color:var(--gold); font-size:60px">فاملي فيود 🎯</h1>
        <div class="btn-main" onclick="startAs('display')">📺 شاشة العرض (على التلفاز)</div>
        <div class="btn-main" onclick="startAs('host')">🎮 شاشة التحكم (للمقدم)</div>
    </div>

    <div id="display" class="screen hidden">
        <div class="scoreboard">
            <div style="text-align:right"><h3>الفريق الأول</h3><div class="t-score" id="d-s1">0</div></div>
            <div style="text-align:center"><h2 style="color:var(--gold)">النقاط</h2><div id="d-rp" style="font-size:40px">0</div></div>
            <div style="text-align:left"><h3>الفريق الثاني</h3><div class="t-score" id="d-s2">0</div></div>
        </div>
        <h2 id="d-q" style="text-align:center; margin:30px 0; font-size:35px">السؤال؟</h2>
        <div class="ans-grid" id="d-grid"></div>
        <div class="strike-box">
            <div class="x-mark" id="dx1">✕</div>
            <div class="x-mark" id="dx2">✕</div>
            <div class="x-mark" id="dx3">✕</div>
        </div>
    </div>

    <div id="host" class="screen hidden">
        <h2 id="h-q" style="color:var(--gold)">السؤال؟</h2>
        <div id="h-list" style="margin-top:20px"></div>
        <div class="ctrl-btns">
            <button class="hbtn" style="background:var(--red); color:white" onclick="addStrike()">✕ خطأ</button>
            <button class="hbtn" style="background:var(--green); color:white" onclick="award(1)">منح لفريق 1</button>
            <button class="hbtn" style="background:var(--green); color:white" onclick="award(2)">منح لفريق 2</button>
            <button class="hbtn" style="background:white" onclick="nextQ()">السؤال التالي ◄</button>
        </div>
    </div>
</div>

<script>
const DB_KEY = 'FF_PRO_DATA_V2';

// أسئلة بـ 8 إجابات تعتمد على تصرفات الناس
const QUESTIONS = [
    {
        q: "شيء يفعله الشخص لما يتأخر على الدوام؟",
        a: [
            {t: "يسوق بسرعة", p: 32}, {t: "يدور عذر/كذبة", p: 22}, {t: "يتصل بزميله يغطي عليه", p: 15}, {t: "يمشي بشويش (خربانة)", p: 10},
            {t: "ما يفطر", p: 8}, {t: "يرسل إيميل اعتذار", p: 6}, {t: "يدخل من الباب الخلفي", p: 4}, {t: "يصور الزحمة سناب", p: 3}
        ]
    },
    {
        q: "شيء يخرب في البيت والناس تحاول تصلحه بنفسها؟",
        a: [
            {t: "حنفية المويه", p: 30}, {t: "اللمبات", p: 25}, {t: "يد الباب", p: 14}, {t: "سيفون الحمام", p: 12},
            {t: "الراوتر/النت", p: 8}, {t: "فيش الكهرباء", p: 6}, {t: "درج المطبخ", p: 3}, {t: "فلتر المكيف", p: 2}
        ]
    },
    {
        q: "شيء يفعله مشجع الكرة لما فريقه يخسر مباراة مهمة؟",
        a: [
            {t: "يقفل جواله", p: 28}, {t: "ينام بدري", p: 22}, {t: "يحذف السناب/تويتر", p: 18}, {t: "يهاوش اللي يكلمه", p: 12},
            {t: "ما يتعشى", p: 10}, {t: "يشيل الشال/القميص", p: 5}, {t: "يذب اللوم على الحكم", p: 3}, {t: "يقول أصلاً ما تابعتها", p: 2}
        ]
    }
];

let state = { qi: 0, s1: 0, s2: 0, rp: 0, strikes: 0, rev: Array(8).fill(false) };

function startAs(mode) {
    document.getElementById('landing').classList.add('hidden');
    document.getElementById(mode).classList.remove('hidden');
    
    // المزامنة: المستمع للتغيرات
    window.addEventListener('storage', (e) => {
        if (e.key === DB_KEY) {
            state = JSON.parse(e.newValue);
            if (mode === 'display') renderDisplay();
            if (mode === 'host') renderHost();
        }
    });

    if(mode === 'host') {
        loadState();
        renderHost();
    } else {
        loadState();
        renderDisplay();
    }
}

function loadState() {
    const data = localStorage.getItem(DB_KEY);
    if(data) state = JSON.parse(data);
}

function save() { 
    localStorage.setItem(DB_KEY, JSON.stringify(state)); 
    renderHost(); 
}

function renderHost() {
    const q = QUESTIONS[state.qi];
    document.getElementById('h-q').innerText = q.q;
    document.getElementById('h-list').innerHTML = q.a.map((ans, i) => `
        <div class="host-ans ${state.rev[i]?'rev':''}" onclick="reveal(${i})">
            <span>${i+1}. ${ans.t}</span>
            <span>${ans.p} نقطة</span>
        </div>
    `).join('');
}

function renderDisplay() {
    const q = QUESTIONS[state.qi];
    document.getElementById('d-q').innerText = q.q;
    document.getElementById('d-s1').innerText = state.s1;
    document.getElementById('d-s2').innerText = state.s2;
    document.getElementById('d-rp').innerText = state.rp;
    document.getElementById('d-grid').innerHTML = q.a.map((ans, i) => `
        <div class="ans-card ${state.rev[i]?'rev':''}">
            <div style="background:var(--navy); width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-left:15px; font-size:16px">${i+1}</div>
            ${state.rev[i] ? ans.t + ' (' + ans.p + ')' : '••••••••'}
        </div>
    `).join('');
    for(let i=1; i<=3; i++) document.getElementById('dx'+i).classList.toggle('hit', i <= state.strikes);
}

function reveal(i) {
    if(state.rev[i]) return;
    state.rev[i] = true;
    state.rp += QUESTIONS[state.qi].a[i].p;
    save();
}

function addStrike() { if(state.strikes < 3) state.strikes++; save(); }

function award(team) {
    if(team === 1) state.s1 += state.rp; else state.s2 += state.rp;
    state.rp = 0;
    save();
}

function nextQ() {
    state.qi = (state.qi + 1) % QUESTIONS.length;
    state.rev = Array(8).fill(false);
    state.strikes = 0; state.rp = 0;
    save();
}
</script>
</body>
</html>

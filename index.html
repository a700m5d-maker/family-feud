<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الشقة فيود🎯</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--gold-dark:#B8860B;--navy:#07122E;--navy-mid:#0E1F50;--navy-card:#0D1E55;--red:#FF2222;--green:#44CC44;--white:#FFF}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--navy);font-family:'Cairo',sans-serif;color:var(--white);overflow:hidden}
.screen{width:100%;height:100%;display:flex;flex-direction:column;padding:2vh}
.hidden{display:none!important}

/* خلفية الجزيئات */
@keyframes fallingParticles {
    0% { transform: translateY(-10vh) translateX(0); opacity: 1; }
    100% { transform: translateY(110vh) translateX(20px); opacity: 0; }
}
.particle {
    position: fixed; width: 6px; height: 6px; background: rgba(255,215,0,0.4);
    border-radius: 50%; animation: fallingParticles 5s linear infinite; pointer-events: none; z-index: 0;
}

/* شعار الشقة فيود */
.main-logo {
    font-family: 'Oswald', 'Cairo', sans-serif; font-size: min(12vw, 80px);
    font-weight: 900; text-transform: uppercase; color: var(--navy);
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
    border: 4px solid var(--navy); padding: 5px 25px; border-radius: 50px;
    display: inline-block; position: relative;
    box-shadow: 0 0 30px rgba(11, 28, 77, 0.8);
}

/* شاشة العرض */
.scoreboard{display:grid;grid-template-columns:1fr auto 1fr;background:var(--navy-mid);border-radius:15px;padding:15px;border:2px solid #2A4A9A}
.t-score{font-size: min(7vw, 70px);font-weight:900}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5vh;margin-top:3vh;flex:1}
.ans-card{background:var(--navy-card);border:2px solid #2A4A9A;border-radius:10px;display:flex;align-items:center;padding:10px 20px;font-size: min(2.5vw, 24px);height: min(9vh, 75px)}
.ans-card.rev{background:#061840;border-color:var(--gold)}

/* الـ X العملاق */
#big-x-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 999; }
.big-x { font-size: 50vw; color: var(--red); font-weight: 900; animation: zoomIn 0.3s; }
@keyframes zoomIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* شاشة التحكم */
.host-ans{background:#0A1840;border:1px solid #2A4A9A;padding:1.2vh;margin-bottom:5px;cursor:pointer;display:flex;justify-content:space-between;font-size:16px;border-radius:8px}
.host-ans.rev{border-color:var(--gold);background:#2A1A00}
.hbtn{padding:10px 15px;border-radius:8px;border:none;cursor:pointer;font-weight:bold;font-family:'Cairo'}

/* قائمة اختيار الأسئلة */
.q-selector-container {
    margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px;
    max-height: 20vh; overflow-y: auto; border: 1px solid #2A4A9A;
}
.q-nav-btn {
    background: #0E1F50; color: white; border: 1px solid #2A4A9A;
    padding: 8px; margin: 4px; border-radius: 5px; cursor: pointer;
    font-size: 13px; text-align: right; width: calc(100% - 8px);
}
.q-nav-btn.active { border-color: var(--gold); color: var(--gold); background: #2A1A00; }
</style>
</head>
<body>

<script>
    for (let i = 0; i < 30; i++) {
        let p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDelay = Math.random() * 5 + 's';
        document.body.appendChild(p);
    }
</script>

<div id="app">
    <audio id="snd-correct" src="https://www.soundjay.com/buttons/sounds/button-37.mp3"></audio>
    <audio id="snd-error" src="https://www.myinstants.com/media/sounds/family-feud-buzzer.mp3"></audio>

    <div id="landing" class="screen" style="align-items:center;justify-content:center;gap:5vh">
        <div class="main-logo">الشقة فيود</div>
        <div class="btn-main" onclick="startAs('display')" style="background:var(--navy-mid);padding:20px;border-radius:15px;cursor:pointer;width:300px;text-align:center;border:2px solid #2A4A9A">📺 شاشة العرض</div>
        <div class="btn-main" onclick="startAs('host')" style="background:var(--navy-mid);padding:20px;border-radius:15px;cursor:pointer;width:300px;text-align:center;border:2px solid #2A4A9A">🎮 شاشة التحكم</div>
    </div>

    <div id="display" class="screen hidden">
        <div id="big-x-overlay"><div class="big-x">✕</div></div>
        <div class="scoreboard">
            <div style="text-align:right"><h3>الفريق الأول</h3><div class="t-score" id="d-s1">0</div></div>
            <div style="text-align:center"><h2 style="color:var(--gold);font-size:18px">النقاط</h2><div id="d-rp" style="font-size:40px">0</div></div>
            <div style="text-align:left"><h3>الفريق الثاني</h3><div class="t-score" id="d-s2">0</div></div>
        </div>
        <h2 id="d-q" style="text-align:center; margin:2.5vh 0; font-size: min(4vw, 35px)">السؤال؟</h2>
        <div class="ans-grid" id="d-grid"></div>
        <div style="display:flex; justify-content:center; gap:20px; margin-top:20px" id="d-strikes">
            <div style="font-size:45px; color:#2A4A9A" class="x-s">✕</div>
            <div style="font-size:45px; color:#2A4A9A" class="x-s">✕</div>
            <div style="font-size:45px; color:#2A4A9A" class="x-s">✕</div>
        </div>
    </div>

    <div id="host" class="screen hidden" style="padding:10px;overflow-y:auto">
        <div id="steal-status" class="hidden">🚨 مرحلة السرقة!</div>
        <h2 id="h-q" style="color:var(--gold);font-size:20px;margin-bottom:10px">السؤال؟</h2>
        <div id="h-list"></div>
        
        <div class="ctrl-btns" style="display:flex;gap:5px;justify-content:center;margin-top:10px">
            <button class="hbtn" style="background:var(--red); color:white" onclick="triggerError()">✕ خطأ</button>
            <button class="hbtn" style="background:var(--green); color:white" onclick="award(1)">منح ف1</button>
            <button class="hbtn" style="background:var(--green); color:white" onclick="award(2)">منح ف2</button>
            <button class="hbtn" style="background:#888" onclick="resetCurrentQ()">↺ إعادة</button>
        </div>

        <div style="margin-top:15px; font-size:14px; color:var(--gold); font-weight:bold">اختر السؤال مباشرة:</div>
        <div class="q-selector-container" id="q-nav-list"></div>
    </div>
</div>

<script>
const DB_KEY = 'FF_APT_V5';

const QUESTIONS = [
    { q: "سمّ شيئاً تجده دائماً في ثلاجة العزوبي؟", a: [{t: "ماء", p: 35}, {t: "أكل بايت", p: 25}, {t: "غازيات", p: 15}, {t: "بيض", p: 10}, {t: "صوصات قديمة", p: 7}, {t: "حليب منتهي", p: 4}, {t: "شوكولاتة", p: 3}, {t: "ليمونة واحدة", p: 1}] },
    { q: "شيء يفعله الناس لما ينقطع النت في الشقة؟", a: [{t: "إعادة تشغيل الراوتر", p: 40}, {t: "استخدام البيانات", p: 28}, {t: "الشكوى للشركة", p: 12}, {t: "سؤال الآخرين عن النت", p: 8}, {t: "النوم", p: 6}, {t: "السوالف مع الموجودين", p: 3}, {t: "محاولة القراءة", p: 2}, {t: "الخروج من البيت", p: 1}] },
    { q: "أكثر شيء يضيع في صالة الشقة؟", a: [{t: "ريموت التلفزيون", p: 45}, {t: "الولاعة", p: 20}, {t: "شاحن الجوال", p: 15}, {t: "المفاتيح", p: 10}, {t: "السماعات", p: 5}, {t: "الشراب (فردة)", p: 3}, {t: "العملات المعدنية", p: 1}, {t: "النظارة", p: 1}] },
    { q: "مشروب لا يخلو منه أي تجمع شبابي؟", a: [{t: "شاهي", p: 40}, {t: "قهوة سوداء", p: 25}, {t: "حمضيات", p: 15}, {t: "مشروبات طاقة", p: 10}, {t: "بيبسي/كولا", p: 5}, {t: "مويه", p: 3}, {t: "كرك", p: 1}, {t: "عصير برتقال", p: 1}] }
];

let state = { qi: 0, s1: 0, s2: 0, rp: 0, strikes: 0, rev: Array(8).fill(false), errorTrigger: 0, isSteal: false };

function startAs(mode) {
    document.getElementById('landing').classList.add('hidden');
    document.getElementById(mode).classList.remove('hidden');
    
    window.addEventListener('storage', (e) => {
        if (e.key === DB_KEY) {
            const newState = JSON.parse(e.newValue);
            if (newState.errorTrigger !== state.errorTrigger && mode === 'display') { showBigX(); }
            state = newState;
            mode === 'display' ? renderDisplay() : renderHost();
        }
    });

    loadState();
    mode === 'display' ? renderDisplay() : renderHost();
}

function loadState() {
    const data = localStorage.getItem(DB_KEY);
    if(data) state = JSON.parse(data);
}

function save() { 
    localStorage.setItem(DB_KEY, JSON.stringify(state)); 
    renderHost(); 
}

function jumpToQ(index) {
    state.qi = index;
    state.rev = Array(8).fill(false);
    state.strikes = 0; state.rp = 0; state.isSteal = false;
    save();
}

function resetCurrentQ() { jumpToQ(state.qi); }

function triggerError() {
    state.errorTrigger = Date.now(); 
    if (!state.isSteal) {
        state.strikes++;
        if (state.strikes >= 3) { state.isSteal = true; }
    }
    save();
    if (state.strikes <= 3 || state.isSteal) {
        document.getElementById('snd-error').play();
        showBigX();
    }
}

function showBigX() {
    const overlay = document.getElementById('big-x-overlay');
    if(overlay) {
        overlay.style.display = 'flex';
        setTimeout(() => { overlay.style.display = 'none'; }, 1200);
    }
}

function renderHost() {
    const q = QUESTIONS[state.qi];
    document.getElementById('h-q').innerText = q.q;
    document.getElementById('h-list').innerHTML = q.a.map((ans, i) => `
        <div class="host-ans ${state.rev[i]?'rev':''}" onclick="reveal(${i})">
            <span>${i+1}. ${ans.t}</span>
            <span>${ans.p} نقطة</span>
        </div>
    `).join('');
    
    // قائمة التنقل بين الأسئلة
    document.getElementById('q-nav-list').innerHTML = QUESTIONS.map((item, idx) => `
        <button class="q-nav-btn ${state.qi === idx ? 'active' : ''}" onclick="jumpToQ(${idx})">
            ${idx+1}. ${item.q}
        </button>
    `).join('');

    const stealBar = document.getElementById('steal-status');
    if (state.isSteal) {
        stealBar.classList.remove('hidden');
        stealBar.style = 'background:var(--gold);color:var(--navy);padding:8px;border-radius:5px;text-align:center;font-weight:900;margin-bottom:10px';
    } else { stealBar.classList.add('hidden'); }
}

function renderDisplay() {
    const q = QUESTIONS[state.qi];
    document.getElementById('d-q').innerText = q.q;
    document.getElementById('d-s1').innerText = state.s1;
    document.getElementById('d-s2').innerText = state.s2;
    document.getElementById('d-rp').innerText = state.rp;
    document.getElementById('d-grid').innerHTML = q.a.map((ans, i) => `
        <div class="ans-card ${state.rev[i]?'rev':''}">
            <div style="background:var(--navy); width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-left:15px; font-size:14px; font-weight:900">${i+1}</div>
            ${state.rev[i] ? ans.t + ' (' + ans.p + ')' : '••••••••'}
        </div>
    `).join('');
    
    const xs = document.querySelectorAll('.x-s');
    xs.forEach((el, idx) => { el.style.color = (idx < state.strikes) ? 'var(--red)' : '#2A4A9A'; });
}

function reveal(i) {
    if(state.rev[i]) return;
    state.rev[i] = true;
    state.rp += QUESTIONS[state.qi].a[i].p;
    document.getElementById('snd-correct').play();
    save();
}

function award(team) {
    if(team === 1) state.s1 += state.rp; else state.s2 += state.rp;
    state.rp = 0; state.strikes = 0; state.isSteal = false;
    save();
}
</script>
</body>
</html>
